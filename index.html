<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigmare vs The Dark One - Epic Ball Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cinema-container">
        <div class="letterbox top"></div>
        
        <div class="scene" id="scene">
            <div class="background">
                <div class="moon"></div>
                <div class="fog"></div>
                <div class="fog layer2"></div>
            </div>

            <!-- Nigmare -->
            <div class="character nigmare" id="nigmare">
                <div class="aura" id="nigmareAura"></div>
                <div class="ball">
                    <div class="ear left"></div>
                    <div class="ear right"></div>
                    <div class="eye left"><div class="pupil">c</div></div>
                    <div class="eye right"><div class="pupil">c</div></div>
                    <div class="mouth"></div>
                    <div class="blood-splatter b1"></div>
                    <div class="blood-splatter b2"></div>
                </div>
                <div class="hand left"></div>
                <div class="hand right"></div>
                <div class="beam" id="nigmareBeam"></div>
            </div>

            <!-- Dark One -->
            <div class="character dark-one" id="darkOne">
                <div class="aura" id="darkOneAura"></div>
                <div class="ball">
                    <div class="ear left"></div>
                    <div class="ear right"></div>
                    <div class="eye left"><div class="pupil"></div><div class="bag"></div></div>
                    <div class="eye right"><div class="pupil"></div><div class="bag"></div></div>
                    <div class="mouth-sad"></div>
                </div>
                <div class="hand left"></div>
                <div class="hand right"></div>
                <div class="beam" id="darkOneBeam"></div>
            </div>

            <!-- Effects -->
            <div class="impact-flash" id="flash"></div>
            <div class="explosion" id="explosion"></div>
            <div class="clash-effect" id="clashEffect"></div>
        </div>

        <div class="subtitles" id="subtitles"></div>

        <div class="letterbox bottom"></div>
        
        <div class="ui">
            <button id="startBtn">FİLMİ BAŞLAT</button>
        </div>
        
        <div class="titles" id="titles">
            <h1 id="titleText">NIGMARE</h1>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
