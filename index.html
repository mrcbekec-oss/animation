<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Scythe vs Shadow Eye - Epic Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cinema-container">
        <div class="letterbox top"></div>
        
        <div class="scene" id="scene">
            <div class="background">
                <div class="moon"></div>
                <div class="fog"></div>
                <div class="fog layer2"></div>
                <div class="darkness-overlay" id="darkness"></div>
            </div>

            <!-- Red Scythe Character -->
            <div class="character red-scythe" id="redScythe">
                <div class="tails">
                    <div class="tail t1"></div>
                    <div class="tail t2"></div>
                    <div class="tail t3"></div>
                    <div class="tail t4"></div>
                    <div class="tail t5"></div>
                    <div class="tail t6"></div>
                </div>
                <div class="arm left"><div class="hand"></div></div>
                <div class="body"></div>
                <div class="leg left"></div>
                <div class="leg right"></div>
                <div class="head">
                    <div class="eye"></div>
                    <div class="cross"></div>
                </div>
                <div class="arm right"><div class="hand"></div></div>
            </div>

            <!-- Shadow Eye Character -->
            <div class="character shadow-eye" id="shadowEye">
                <div class="body-blob">
                    <div class="spikes">
                        <div class="spike s1"></div>
                        <div class="spike s2"></div>
                        <div class="spike s3"></div>
                        <div class="spike s4"></div>
                    </div>
                    <div class="giant-eye">
                        <div class="pupil"></div>
                        <div class="veins"></div>
                    </div>
                    <div class="blood-drip"></div>
                </div>
                <!-- Floating Hands -->
                <div class="floating-hand left">
                    <div class="fingers"></div>
                </div>
                <div class="floating-hand right">
                    <div class="fingers"></div>
                </div>
                <div class="laser-beam" id="laserBeam"></div>
            </div>

            <!-- Effects -->
            <div class="impact-flash" id="flash"></div>
            <div class="blood-explosion" id="bloodExplosion"></div>
            <div class="clash-effect" id="clashEffect"></div>
            <div class="final-explosion" id="finalExplosion"></div>
        </div>

        <div class="subtitles" id="subtitles"></div>

        <div class="letterbox bottom"></div>
        
        <div class="ui">
            <button id="startBtn">SAVAŞI BAŞLAT</button>
        </div>
        
        <div class="titles" id="titles">
            <h1 id="titleText">VS</h1>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
